<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Merchant Assistant — Architecture</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin
    src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;


    const COLORS = {
      bg: "#FAFAF8",
      card: "#FFFFFF",
      border: "rgba(0,0,0,0.08)",
      borderHover: "rgba(0,0,0,0.15)",
      text: "#1a1a1a",
      textMuted: "#6b6b6b",
      textLight: "#999",

      funding: "#0F6E56", fundingBg: "#E1F5EE", fundingLight: "#9FE1CB",
      reconciliation: "#185FA5", reconciliationBg: "#E6F1FB", reconciliationLight: "#85B7EB",
      chargeback: "#993C1D", chargebackBg: "#FAECE7", chargebackLight: "#F0997B",
      sales: "#534AB7", salesBg: "#EEEDFE", salesLight: "#AFA9EC",
      inventory: "#639922", inventoryBg: "#EAF3DE", inventoryLight: "#C0DD97",
      profit: "#854F0B", profitBg: "#FAEEDA", profitLight: "#FAC775",
      cashflow: "#0F6E56", cashflowBg: "#E1F5EE", cashflowLight: "#5DCAA5",
      reporting: "#5F5E5A", reportingBg: "#F1EFE8", reportingLight: "#B4B2A9",
      payments: "#993556", paymentsBg: "#FBEAF0", paymentsLight: "#ED93B1",

      safety: "#444441", safetyBg: "#F1EFE8",
      memory: "#444441", memoryBg: "#F1EFE8",
      router: "#185FA5", routerBg: "#E6F1FB",
      quality: "#BA7517", qualityBg: "#FAEEDA", qualityBorder: "#EF9F27",
      prepare: "#444441", prepareBg: "#F1EFE8",
      deliver: "#0F6E56", deliverBg: "#E1F5EE",
      dataRetrieval: "#534AB7", dataRetrievalBg: "#EEEDFE",
      organize: "#534AB7", organizeBg: "#EEEDFE",

      database: "#185FA5", databaseBg: "#E6F1FB",
      clover: "#0F6E56", cloverBg: "#E1F5EE",
      plaid: "#534AB7", plaidBg: "#EEEDFE",
      quickbooks: "#854F0B", quickbooksBg: "#FAEEDA",
    };

    const specialists = [
      {
        id: "funding", name: "Funding specialist", icon: "\u{1F4B0}",
        color: COLORS.funding, bg: COLORS.fundingBg, light: COLORS.fundingLight,
        desc: "Where\u2019s my money, when will I get paid",
        tools: ["Funding summary", "Deposit queries", "Batch queries", "Bank account check"],
        sources: ["database", "clover", "plaid"],
        questions: ["Where\u2019s my money?", "Is anything off with my deposits?", "Why was Tuesday\u2019s deposit smaller than expected?"],
      },
      {
        id: "reconciliation", name: "Reconciliation specialist", icon: "\u2696\uFE0F",
        color: COLORS.reconciliation, bg: COLORS.reconciliationBg, light: COLORS.reconciliationLight,
        desc: "Why don\u2019t my numbers match",
        tools: ["Bank-vs-sales reconciliation", "Deposit-to-batch matching", "Accounting comparison"],
        sources: ["database", "clover", "plaid", "quickbooks"],
        questions: ["Why doesn\u2019t my bank match my sales report?", "My accountant says I\u2019m missing a deposit \u2014 can you find it?", "Why is my accounting software showing different revenue than Clover?"],
      },
      {
        id: "chargeback", name: "Chargeback specialist", icon: "\u{1F6E1}\uFE0F",
        color: COLORS.chargeback, bg: COLORS.chargebackBg, light: COLORS.chargebackLight,
        desc: "What\u2019s this dispute, should I fight it",
        tools: ["Chargeback explanation", "Chargeback listing", "Risk assessment", "Representment drafting"],
        sources: ["database", "clover"],
        questions: ["Did I get a chargeback this month?", "Should I fight this dispute?", "What\u2019s my chargeback rate \u2014 am I at risk?"],
      },
      {
        id: "sales", name: "Sales specialist", icon: "\u{1F4CA}",
        color: COLORS.sales, bg: COLORS.salesBg, light: COLORS.salesLight,
        desc: "What\u2019s selling, busiest times, trends",
        tools: ["Sales summary", "Item performance", "Period comparison", "Chart generation"],
        sources: ["database", "clover"],
        questions: ["What\u2019s my best selling item this week?", "My sales this weekend were lower than usual. Is something wrong?", "How are my online orders trending vs in-store?"],
      },
      {
        id: "payments", name: "Payments specialist", icon: "\u{1F4B3}",
        color: COLORS.payments, bg: COLORS.paymentsBg, light: COLORS.paymentsLight,
        desc: "Payment status, declines, terminal health",
        tools: ["Payment lookup", "Decline analysis", "Terminal status", "Processing history"],
        sources: ["database", "clover"],
        questions: ["Why did that payment fail?", "Show me declined transactions this week", "Are all my terminals online?"],
      },
      {
        id: "inventory", name: "Inventory specialist", icon: "\u{1F4E6}",
        color: COLORS.inventory, bg: COLORS.inventoryBg, light: COLORS.inventoryLight,
        desc: "What do I need to order, vendor tracking",
        tools: ["Stock levels", "Reorder forecast", "Vendor price history"],
        sources: ["clover", "quickbooks"],
        questions: ["What do I need to order?", "What vendors increased prices?", "Based on my sales trends, when will I run out of X?"],
      },
      {
        id: "profit", name: "Profit specialist", icon: "\u{1F48E}",
        color: COLORS.profit, bg: COLORS.profitBg, light: COLORS.profitLight,
        desc: "Am I making money, real cost per transaction",
        tools: ["P&L summary", "Fee analysis", "Expense breakdown", "Margin by item"],
        sources: ["database", "clover", "quickbooks"],
        questions: ["Show profit trends by location", "How much do refunds cost me monthly?", "Am I actually profitable after processing fees?"],
      },
      {
        id: "cashflow", name: "Cash flow specialist", icon: "\u{1F30A}",
        color: COLORS.cashflow, bg: COLORS.cashflowBg, light: COLORS.cashflowLight,
        desc: "Can I afford this, what does my week look like",
        tools: ["Cash position", "Cashflow forecast", "Upcoming obligations"],
        sources: ["database", "plaid", "quickbooks"],
        questions: ["What bills are due before Friday?", "What are my margins?", "When\u2019s the best time to pay this vendor bill?"],
      },
      {
        id: "reporting", name: "Reporting specialist", icon: "\u{1F4CB}",
        color: COLORS.reporting, bg: COLORS.reportingBg, light: COLORS.reportingLight,
        desc: "Weekly summaries, anomaly detection",
        tools: ["Sales summary", "Funding summary", "Chargeback summary", "Chart & report generation"],
        sources: ["database", "clover", "plaid", "quickbooks"],
        questions: ["Write a weekly owner\u2019s update", "Give me a month-end summary for my accountant", "What should I focus on this week?"],
      },
    ];

    const dataSources = [
      { id: "database", name: "Your database", icon: "\u{1F5C4}\uFE0F", color: COLORS.database, bg: COLORS.databaseBg, desc: "Transactions, batches, deposits, chargebacks, fees, reserves" },
      { id: "clover", name: "Clover", icon: "\u2618\uFE0F", color: COLORS.clover, bg: COLORS.cloverBg, desc: "Sales, orders, inventory, employees, tips, refunds, devices", via: "7+ specialists", featured: true },
      { id: "plaid", name: "Financial institutions", icon: "\u{1F3E6}", color: COLORS.plaid, bg: COLORS.plaidBg, desc: "Bank account status, balances, posted transactions", via: "3+ specialists" },
      { id: "quickbooks", name: "Accounting", icon: "\u{1F4D2}", color: COLORS.quickbooks, bg: COLORS.quickbooksBg, desc: "QuickBooks, Sage, Gusto, FreshBooks, and more", via: "5+ specialists" },
    ];

    const sourceColorMap = {
      database: { color: COLORS.database, bg: COLORS.databaseBg },
      clover: { color: COLORS.clover, bg: COLORS.cloverBg },
      plaid: { color: COLORS.plaid, bg: COLORS.plaidBg },
      quickbooks: { color: COLORS.quickbooks, bg: COLORS.quickbooksBg },
    };

    const sourceNameMap = { database: "Database", clover: "Clover", plaid: "Financial institutions", quickbooks: "Accounting" };

    function SourcePill({ sourceId }) {
      const s = sourceColorMap[sourceId];
      return (
        <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 20, background: s.bg, color: s.color, fontSize: 11, fontWeight: 550, letterSpacing: "0.01em", border: `1px solid ${s.color}22` }}>
          {sourceNameMap[sourceId]}
        </span>
      );
    }

    function SectionLabel({ children }) {
      return <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase", color: COLORS.textLight, marginBottom: 8 }}>{children}</div>;
    }

    function NodeBox({ color, bg, borderColor, children, style, glow, featured, ...rest }) {
      return (
        <div style={{ background: bg || "#fff", border: `1px solid ${borderColor || color || COLORS.border}`, borderRadius: 12, padding: "12px 16px", position: "relative", transition: "box-shadow 0.2s, transform 0.15s", boxShadow: glow ? `0 0 0 3px ${color}18, 0 2px 8px ${color}10` : featured ? `0 0 0 2px ${color}30` : "0 1px 3px rgba(0,0,0,0.04)", ...style }} {...rest}>{children}</div>
      );
    }

    function Arrow({ direction = "down", label, color = COLORS.textLight, style }) {
      const isDown = direction === "down";
      const isRight = direction === "right";
      return (
        <div style={{ display: "flex", flexDirection: isDown ? "column" : "row", alignItems: "center", justifyContent: "center", gap: 2, padding: isDown ? "4px 0" : "0 4px", color, fontSize: 11, ...style }}>
          {label && <span style={{ fontSize: 10, color: COLORS.textMuted, whiteSpace: "nowrap" }}>{label}</span>}
          <span style={{ fontSize: 16, lineHeight: 1 }}>{isDown ? "\u2193" : isRight ? "\u2192" : "\u2193"}</span>
        </div>
      );
    }

    function LoopsSection() {
      return (
        <div style={{ border: `2px dashed ${COLORS.border}`, borderRadius: 18, padding: "16px 16px 12px", margin: "12px 0", position: "relative", background: "rgba(0,0,0,0.01)" }}>
          <div style={{ position: "absolute", top: -11, left: "50%", transform: "translateX(-50%)", background: "#fff", padding: "2px 14px", borderRadius: 20, border: `1.5px solid ${COLORS.border}`, fontSize: 10, fontWeight: 600, color: COLORS.textMuted, letterSpacing: "0.08em", textTransform: "uppercase", whiteSpace: "nowrap" }}>Reasoning cycle</div>

          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 0, marginTop: 8 }}>
            {/* Left return path */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 10px 0 2px", minWidth: 30 }}>
              <svg width="20" height="100%" style={{ minHeight: 120 }}>
                <line x1="10" y1="95%" x2="10" y2="12" stroke={COLORS.dataRetrieval} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.4" />
                <path d="M6 16L10 6L14 16" fill="none" stroke={COLORS.dataRetrieval} strokeWidth="1.5" strokeLinecap="round" opacity="0.5" />
              </svg>
              <div style={{ fontSize: 8, fontWeight: 600, color: COLORS.dataRetrieval, opacity: 0.6, writingMode: "vertical-lr", transform: "rotate(180deg)", letterSpacing: "0.08em", marginTop: 4 }}>DATA</div>
            </div>

            {/* Center: the two loop boxes */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              {/* Data Loop */}
              <div style={{ border: `1.5px solid ${COLORS.dataRetrieval}25`, borderRadius: 14, padding: 16, background: `${COLORS.dataRetrievalBg}40`, position: "relative" }}>
                <div style={{ position: "absolute", top: -10, left: 16, background: COLORS.dataRetrievalBg, border: `1px solid ${COLORS.dataRetrieval}30`, borderRadius: 6, padding: "2px 10px", fontSize: 10, fontWeight: 600, color: COLORS.dataRetrieval, letterSpacing: "0.05em" }}>DATA LOOP</div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0, marginTop: 8 }}>
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Specialist needs data {"\u2193"}</div>
                  <NodeBox color={COLORS.dataRetrieval} bg={COLORS.dataRetrievalBg} style={{ width: "100%", textAlign: "center", padding: "8px 12px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.dataRetrieval }}>Data retrieval</div>
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>Parallel queries, entity resolution</div>
                  </NodeBox>
                  <Arrow />
                  <NodeBox color={COLORS.organize} bg={`${COLORS.organizeBg}80`} style={{ width: "100%", textAlign: "center", padding: "8px 12px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.organize }}>Organize results</div>
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>Cache, summarize, attach charts</div>
                  </NodeBox>
                </div>
              </div>

              {/* Quality Loop */}
              <div style={{ border: `1.5px solid ${COLORS.qualityBorder}50`, borderRadius: 14, padding: 16, background: `${COLORS.qualityBg}40`, position: "relative" }}>
                <div style={{ position: "absolute", top: -10, left: 16, background: COLORS.qualityBg, border: `1px solid ${COLORS.qualityBorder}40`, borderRadius: 6, padding: "2px 10px", fontSize: 10, fontWeight: 600, color: COLORS.quality, letterSpacing: "0.05em" }}>QUALITY LOOP</div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0, marginTop: 8 }}>
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Specialist has draft answer {"\u2193"}</div>
                  <NodeBox color={COLORS.quality} bg={COLORS.qualityBg} borderColor={COLORS.qualityBorder} glow style={{ width: "100%", textAlign: "center", padding: "8px 12px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.quality }}>Quality review</div>
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>AI reviews its own work</div>
                  </NodeBox>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, width: "100%", marginTop: 8 }}>
                    <div style={{ textAlign: "center", padding: "6px 4px", borderRadius: 8, background: "#EAF3DE", fontSize: 10, fontWeight: 600, color: "#3B6D11" }}>Approved {"\u2192"}</div>
                    <div style={{ textAlign: "center", padding: "6px 4px", borderRadius: 8, background: "#FAEEDA", fontSize: 10, fontWeight: 600, color: "#854F0B" }}>Refine {"\u21A9"}</div>
                    <div style={{ textAlign: "center", padding: "6px 4px", borderRadius: 8, background: "#FAECE7", fontSize: 10, fontWeight: 600, color: "#993C1D" }}>Escalate {"\u2192"}</div>
                  </div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 6 }}>Max 2 refinement rounds</div>
                </div>
              </div>
            </div>

            {/* Right return path */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 2px 0 10px", minWidth: 30 }}>
              <svg width="20" height="100%" style={{ minHeight: 120 }}>
                <line x1="10" y1="95%" x2="10" y2="12" stroke={COLORS.qualityBorder} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.4" />
                <path d="M6 16L10 6L14 16" fill="none" stroke={COLORS.qualityBorder} strokeWidth="1.5" strokeLinecap="round" opacity="0.5" />
              </svg>
              <div style={{ fontSize: 8, fontWeight: 600, color: COLORS.quality, opacity: 0.6, writingMode: "vertical-lr", transform: "rotate(180deg)", letterSpacing: "0.08em", marginTop: 4 }}>REFINE</div>
            </div>
          </div>
        </div>
      );
    }

    function Diagram1() {
      const [hoverSpecialist, setHoverSpecialist] = useState(null);
      return (
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <h2 style={{ fontSize: 22, fontWeight: 600, color: COLORS.text, margin: 0, letterSpacing: "-0.02em" }}>AI agent workflow</h2>
            <p style={{ fontSize: 14, color: COLORS.textMuted, margin: "6px 0 0", maxWidth: 520, marginLeft: "auto", marginRight: "auto" }}>
              Every question flows through authentication, safety, intent classification, specialist analysis, quality review, and real-time delivery.
            </p>
          </div>

          {/* ── Pre-workflow: Identity & Authorization ── */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0 }}>
            <NodeBox color="#185FA5" bg="#E6F1FB" style={{ minWidth: 340, textAlign: "center", padding: "14px 20px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 6 }}>
                <span style={{ fontSize: 14 }}>{"\u{1F512}"}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#185FA5" }}>Identity & authorization</span>
              </div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 8 }}>Authenticated and authorized before anything reaches the AI</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "center" }}>
                {["Entra ID", "OpenFGA", "OAuth 2.0 / JWT", "Tenant isolation", "Audit logging"].map(tag => (
                  <span key={tag} style={{ fontSize: 9, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: "#fff", color: "#185FA5", border: "1px solid #185FA520" }}>{tag}</span>
                ))}
              </div>
            </NodeBox>
            <Arrow />
          </div>

          {/* ── Divider: Agent workflow begins ── */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "8px 0 16px" }}>
            <div style={{ flex: 1, height: 2, background: COLORS.router, opacity: 0.25, borderRadius: 1 }} />
            <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: COLORS.router, whiteSpace: "nowrap", background: COLORS.routerBg, padding: "5px 16px", borderRadius: 20, border: `1.5px solid ${COLORS.router}30` }}>Agent workflow</span>
            <div style={{ flex: 1, height: 2, background: COLORS.router, opacity: 0.25, borderRadius: 1 }} />
          </div>

          {/* ── Entry nodes ── */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <NodeBox color={COLORS.safety} bg={COLORS.safetyBg} style={{ minWidth: 220, textAlign: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.safety }}>Guardrails</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Prompt injection, topic boundaries, content filtering</div>
              </NodeBox>
            </div>
            <div style={{ display: "flex", alignItems: "stretch", gap: 0, position: "relative", width: 340 }}>
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}><Arrow label="passed" /></div>
              <div style={{ position: "absolute", right: -120, top: 0, display: "flex", alignItems: "center", gap: 6, color: "#A32D2D", fontSize: 11 }}>
                <span style={{ marginTop: 8 }}>{"\u2192"}</span>
                <span style={{ background: "#FCEBEB", border: "1px solid #F0959540", borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 500, color: "#A32D2D" }}>Blocked — polite error</span>
              </div>
            </div>
            <NodeBox color={COLORS.memory} bg={COLORS.memoryBg} style={{ minWidth: 240, textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.memory }}>Conversation memory</div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Sliding window, context management</div>
              <div style={{ fontSize: 10, color: COLORS.textLight, marginTop: 2, fontStyle: "italic" }}>Optimized for query efficiency and cost</div>
            </NodeBox>
            <Arrow />
            <NodeBox color={COLORS.router} bg={COLORS.routerBg} style={{ minWidth: 280, textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.router }}>Question understanding</div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>AI classifies intent and complexity</div>
              <div style={{ fontSize: 10, color: COLORS.textLight, marginTop: 3, fontStyle: "italic" }}>May invoke multiple specialists for complex questions</div>
            </NodeBox>

            {/* ── Routing arrows to specialists ── */}
            <div style={{ position: "relative", width: "80%", maxWidth: 760, height: 36, margin: "0 0 -4px" }}>
              {/* Center vertical stem */}
              <div style={{ position: "absolute", left: "50%", top: 0, width: 1, height: 12, background: COLORS.router, opacity: 0.5 }} />
              {/* Horizontal spread bar */}
              <div style={{ position: "absolute", left: "15%", right: "15%", top: 12, height: 1, background: COLORS.router, opacity: 0.4 }} />
              {/* Left arrow down */}
              <div style={{ position: "absolute", left: "15%", top: 12, width: 1, height: 14, background: COLORS.router, opacity: 0.4 }} />
              <div style={{ position: "absolute", left: "calc(15% - 3px)", top: 24, fontSize: 10, color: COLORS.router, opacity: 0.5, lineHeight: 1 }}>{"\u25BC"}</div>
              {/* Center arrow down */}
              <div style={{ position: "absolute", left: "50%", top: 12, width: 1, height: 14, background: COLORS.router, opacity: 0.4 }} />
              <div style={{ position: "absolute", left: "calc(50% - 3px)", top: 24, fontSize: 10, color: COLORS.router, opacity: 0.5, lineHeight: 1 }}>{"\u25BC"}</div>
              {/* Right arrow down */}
              <div style={{ position: "absolute", right: "15%", top: 12, width: 1, height: 14, background: COLORS.router, opacity: 0.4 }} />
              <div style={{ position: "absolute", right: "calc(15% - 3px)", top: 24, fontSize: 10, color: COLORS.router, opacity: 0.5, lineHeight: 1 }}>{"\u25BC"}</div>
            </div>
          </div>

          {/* ── Specialists Grid ── */}
          <div style={{ margin: "0 0 0", padding: "20px 16px", background: "linear-gradient(180deg, rgba(83,74,183,0.03) 0%, transparent 100%)", borderRadius: 16, border: `1px dashed ${COLORS.border}`, position: "relative" }}>
            <SectionLabel>N specialized AI agents</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
              {specialists.map((s) => (
                <NodeBox key={s.id} color={s.color} bg={s.bg} featured={hoverSpecialist === s.id} onMouseEnter={() => setHoverSpecialist(s.id)} onMouseLeave={() => setHoverSpecialist(null)} style={{ cursor: "default", padding: "10px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                    <span style={{ fontSize: 14 }}>{s.icon}</span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: s.color }}>{s.name}</span>
                  </div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, lineHeight: 1.35, marginBottom: 6 }}>{s.desc}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                    {s.sources.map(src => (
                      <span key={src} style={{ fontSize: 9, fontWeight: 550, padding: "1px 5px", borderRadius: 4, background: sourceColorMap[src].bg, color: sourceColorMap[src].color, border: `0.5px solid ${sourceColorMap[src].color}20` }}>{sourceNameMap[src]}</span>
                    ))}
                  </div>
                </NodeBox>
              ))}
            </div>
          </div>

          {/* ── Loops Section ── */}
          <LoopsSection />

                <line x1="272" y1="400" x2="298" y2="400" stroke="#1C7293" strokeWidth="1.8" markerEnd="url(#arr)" />

            <p style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.6, marginTop: 16, maxWidth: 700 }}>

            </p>

          {/* ── Query pinning callout ── */}
          <div style={{ padding: "20px 24px", borderRadius: 14, background: "#f8f8f6", border: `1px solid ${COLORS.border}`, marginBottom: 32 }}>
            <SectionLabel>Design concept · Query Pinning</SectionLabel>
            <div style={{ fontSize: 16, fontWeight: 600, color: COLORS.text, marginBottom: 10 }}>Explore freely, then pin what matters</div>
            <p style={pText}>Query pinning is the platform’s answer to the central tension in conversational analytics: users want the freedom to ask anything, but the business needs numbers that are consistent, repeatable, and defensible. Ask Nanci delivers both by separating exploration from certification. When a user asks a new question, the AI composes the query itself through the platform’s tool layer — full conversational flexibility, with every request still passing through the authorization gate and the governed data access layer.</p>
            <p style={pText}>When the user gets an answer they trust, they pin it. Pinning freezes the exact query behind that answer — the logic, the joins, the definitions — into the pinned query library. From that moment on, asking that question replays the identical query every time: same math, same result shape, same certified logic. The only thing that varies is the authorization scope of whoever is asking. Yesterday’s exploratory answer becomes tomorrow’s guaranteed metric.</p>
            <p style={{ ...pText, marginBottom: 0 }}>This gives the platform a property conversational AI usually lacks: determinism where it counts. The questions that run a business — the ones asked every Monday, quoted in board decks, reconciled against reports — become pinned, auditable, and immune to the natural variability of AI-generated queries. Every pinned query has a known cost, a known result shape, and a complete execution record. Accuracy stops being a hope and becomes a property of the library — a library your users build themselves, one trusted answer at a time.</p>
          </div>
